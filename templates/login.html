<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>控制台验证 - Codex</title>
    <link rel="stylesheet" href="/static/css/style.css?v={{ static_version }}">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23007AFF'/><circle cx='50' cy='50' r='20' fill='white'/></svg>">
    <style>
        .login-wrap {
            max-width: 400px;
            margin: 15vh auto 0;
            padding: 20px;
        }

        .login-card {
            padding: 48px;
            text-align: center;
        }

        .login-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .login-subtitle {
            color: var(--text-secondary);
            margin-bottom: 40px;
            font-size: 15px;
        }

        .login-error {
            background: rgba(255, 59, 48, 0.1);
            color: #FF3B30;
            border: 1px solid rgba(255, 59, 48, 0.2);
            border-radius: var(--radius);
            padding: 12px 16px;
            margin-bottom: 24px;
            font-size: 13px;
            font-weight: 500;
            animation: shake 0.4s ease;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            20%,
            60% {
                transform: translateX(-4px);
            }

            40%,
            80% {
                transform: translateX(4px);
            }
        }
    </style>
</head>

<body style="background: var(--bg-system); display: flex; align-items: flex-start; justify-content: center;">
    <div class="login-wrap">
        <div class="card login-card">
            <div class="card-header" style="justify-content: center; padding: 0; border: none; margin-bottom: 12px;">
                <h3 class="login-title">CPA-Codex-Manager</h3>
            </div>
            <p class="login-subtitle">控制台登录验证</p>

            <div class="card-body" style="padding: 0;">
                {% if error %}
                <div class="login-error">{{ error }}</div>
                {% endif %}

                <form method="post" action="/login">
                    <input type="hidden" name="next" value="{{ next }}">
                    <div class="form-group" style="text-align: left;">
                        <label for="password">访问密码</label>
                        <input type="password" id="password" name="password" autocomplete="current-password" required
                            autofocus placeholder="请输入验证密码">
                    </div>

                    <div class="form-actions" style="margin-top: 32px; padding: 0; border: none;">
                        <button type="submit" class="btn btn-primary btn-lg" style="width: 100%;">验证并进入</button>
                    </div>
                </form>
            </div>
        </div>

        <div
            style="margin-top: 24px; text-align: center; font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em;">
            CPA-Codex-Manager{{ app_version }}
        </div>
    </div>
</body>

</html>
